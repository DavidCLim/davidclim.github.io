<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HYPER FISHIES</title>
    <meta name="description" content="A colorful underwater Hyper Fishies title card.">
    <link rel="stylesheet" href="styles.css?v=2.0">
  </head>
  <body>
    <main class="title-shell">
      <a href="../../" class="home-link">HOME</a>

      <section class="title-card" aria-label="Hyper Fishies title card">
        <div class="water-light"></div>
        <div class="fish fish-one"></div>
        <div class="fish fish-two"></div>
        <div class="fish fish-three"></div>
        <div class="bubble b1"></div>
        <div class="bubble b2"></div>
        <div class="bubble b3"></div>
        <div class="bubble b4"></div>

        <h1 class="logo-title" aria-label="HYPER fishies">
          <span class="logo-row">
            <span class="letter letter-h"><span class="panel"></span><span class="glyph">H</span></span>
            <span class="letter letter-y"><span class="panel"></span><span class="glyph">Y</span></span>
            <span class="letter letter-p"><span class="panel"></span><span class="glyph">P</span></span>
            <span class="letter letter-e"><span class="panel"></span><span class="glyph">E</span></span>
            <span class="letter letter-r"><span class="panel"></span><span class="glyph">R</span></span>
          </span>
          <span class="fishies-word">fishies</span>
        </h1>

        <p class="credits">BY DAVID<br>&amp; LUCAS TAN<br>&amp; VALERIUS KOH</p>
      </section>
    </main>
  </body>
</html>
