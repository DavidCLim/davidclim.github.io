<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HYPER FISHIES</title>
    <meta name="description" content="A colorful underwater David Edition fish collecting game.">
    <link rel="stylesheet" href="styles.css?v=1.0">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <a href="../../" class="home-link">HOME</a>
        <div class="title-block" aria-label="HYPER fishies">
          <p class="eyebrow">THIRD WEB GAME</p>
          <h1 class="logo-title">
            <span class="logo-row">
              <span class="letter letter-h"><i></i>H</span>
              <span class="letter letter-y"><i></i>Y</span>
              <span class="letter letter-p"><i></i>P</span>
              <span class="letter letter-e"><i></i>E</span>
              <span class="letter letter-r"><i></i>R</span>
            </span>
            <span class="fishies-word">fishies</span>
          </h1>
          <p class="credits">BY DAVID, LUCAS TAN &amp; VALERIUS KOH</p>
        </div>
        <button id="new-game" type="button">NEW GAME</button>
      </header>

      <section class="hud" aria-label="Game status">
        <div class="stat-card"><span>SCORE</span><strong id="score">0</strong></div>
        <div class="stat-card"><span>PEARLS</span><strong id="pearls">0 / 10</strong></div>
        <div class="stat-card"><span>TIME</span><strong id="timer">60</strong></div>
        <div class="stat-card"><span>STATUS</span><strong id="status">SWIM</strong></div>
      </section>

      <section class="ocean-panel" aria-label="HYPER FISHIES play area">
        <canvas id="game" width="960" height="560"></canvas>
        <div class="message-card" id="message-card">
          <h2 id="message-title">DIVE IN</h2>
          <p id="message">Use arrow keys, WASD, or drag/touch to collect glowing pearls. Avoid jellyfish and hooks.</p>
          <button id="start-game" type="button">START SWIM</button>
        </div>
      </section>
    </main>

    <script src="app.js?v=1.0"></script>
  </body>
</html>
