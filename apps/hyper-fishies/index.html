<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HYPER FISHIES</title>
    <meta name="description" content="A playable underwater rescue game by David, Lucas Tan, and Valerius Koh.">
    <link rel="stylesheet" href="styles.css?v=4.0">
  </head>
  <body>
    <main class="game-shell">
      <section class="game-panel" aria-label="Hyper Fishies game">
        <div class="topbar">
          <a class="back-link" href="../../">HOME</a>
          <div class="brand">
            <span class="brand-main">HYPER</span>
            <span class="brand-sub">fishies</span>
          </div>
          <button id="restartButton" class="game-button" type="button">NEW RUN</button>
        </div>

        <div class="hud" aria-live="polite">
          <div class="hud-card"><span>SCORE</span><strong id="scoreText">0</strong></div>
          <div class="hud-card"><span>FISHIES</span><strong id="fishText">0/5</strong></div>
          <div class="hud-card"><span>LEVEL</span><strong id="levelText">1</strong></div>
          <div class="hud-card meter-card"><span>OXYGEN</span><div class="meter"><i id="oxygenBar"></i></div></div>
          <div class="hud-card meter-card"><span>HEALTH</span><div class="meter health"><i id="healthBar"></i></div></div>
        </div>

        <div class="canvas-wrap">
          <canvas id="gameCanvas" width="960" height="560" aria-label="Hyper Fishies playable game area"></canvas>
          <div id="messagePanel" class="message-panel show">
            <h1>HYPER FISHIES</h1>
            <p>Rescue the glowing fishies, grab bubbles for oxygen, and dodge jelly shocks.</p>
            <button id="startButton" class="game-button big" type="button">START GAME</button>
          </div>
        </div>

        <div class="controls-note">MOVE: WASD / ARROWS  |  DASH: SPACE  |  TOUCH: DRAG</div>
      </section>
    </main>
    <script src="script.js?v=1.0"></script>
  </body>
</html>
