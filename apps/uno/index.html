<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>UNO Web Game</title>
    <meta name="description" content="A simple browser-based UNO game.">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="wild-fix.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <a href="../../" class="home-link">Home</a>
        <div>
          <p class="eyebrow">First web app</p>
          <h1>UNO Web Game</h1>
        </div>
        <button id="new-game" type="button">New Game</button>
      </header>

      <section class="controls" aria-label="Game options">
        <div>
          <span>Mode</span>
          <div class="segmented" id="mode-picker">
            <button type="button" data-mode="classic" class="active">Classic</button>
            <button type="button" data-mode="mercy">No Mercy</button>
            <button type="button" data-mode="flip">Flip</button>
          </div>
        </div>
        <div>
          <span>Bot difficulty</span>
          <div class="segmented" id="difficulty-picker">
            <button type="button" data-difficulty="easy">Easy</button>
            <button type="button" data-difficulty="medium" class="active">Medium</button>
            <button type="button" data-difficulty="hard">Hard</button>
          </div>
        </div>
        <a href="../../changelog.html" class="changelog-link">Changelog</a>
      </section>

      <section class="scoreboard" aria-label="Game status">
        <div>
          <span>Computer</span>
          <strong id="computer-count">7 cards</strong>
        </div>
        <div>
          <span>Current color</span>
          <strong id="current-color">Red</strong>
        </div>
        <div>
          <span>Game mode</span>
          <strong id="game-mode">Classic</strong>
        </div>
        <div>
          <span>You</span>
          <strong id="player-count">7 cards</strong>
        </div>
      </section>

      <section class="table" aria-label="UNO table">
        <div class="opponent-area">
          <h2>Computer hand</h2>
          <div id="computer-hand" class="computer-hand"></div>
        </div>

        <div class="center-area">
          <div>
            <p class="pile-label">Draw pile</p>
            <button id="draw-card" type="button" class="deck-card" aria-label="Draw a card">
              <span class="uno-logo">UNO</span>
              <span class="edition">DAVID EDITION</span>
            </button>
          </div>

          <div>
            <p class="pile-label">Discard pile</p>
            <div id="discard-card" class="card red" aria-live="polite"></div>
          </div>
        </div>

        <section class="message-panel" aria-live="polite">
          <h2 id="turn-heading">Your turn</h2>
          <p id="message">Play a matching color, number, or action card.</p>
          <div id="color-picker" class="color-picker" hidden>
            <button type="button" data-color="red">Red</button>
            <button type="button" data-color="yellow">Yellow</button>
            <button type="button" data-color="green">Green</button>
            <button type="button" data-color="blue">Blue</button>
          </div>
        </section>
      </section>

      <section class="player-area" aria-label="Your hand">
        <h2>Your hand</h2>
        <div id="player-hand" class="player-hand"></div>
      </section>
    </main>

    <div id="win-modal" class="win-modal" hidden>
      <div class="win-dialog" role="dialog" aria-modal="true" aria-labelledby="win-title">
        <p id="win-title">Round complete</p>
        <button id="win-button" type="button">You Win!</button>
      </div>
    </div>

    <script src="app.js"></script>
    <script src="wild-fix.js"></script>
  </body>
</html>
