<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Plants vs Zombies Web Game</title>
    <meta name="description" content="A lane-defense plants versus zombies style web game using original David Edition plant art.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <a href="../../" class="home-link">Home</a>
        <div>
          <p class="eyebrow">Second web game</p>
          <h1>PLANTS VS ZOMBIES</h1>
        </div>
        <button id="new-game" type="button">New Game</button>
      </header>

      <section class="hud" aria-label="Game status">
        <div class="stat-card sun-card">
          <span>Sun</span>
          <strong id="sun-count">75</strong>
        </div>
        <div class="stat-card">
          <span>Wave</span>
          <strong id="wave-count">1</strong>
        </div>
        <div class="stat-card">
          <span>Zombies left</span>
          <strong id="zombies-left">24</strong>
        </div>
        <div class="stat-card">
          <span>Status</span>
          <strong id="status-label">Plant!</strong>
        </div>
      </section>

      <section class="seed-bank" aria-label="Choose a plant">
        <button class="seed-card active" data-plant="pea" type="button">
          <span class="mini-plant pea"></span>
          <strong>Peashooter</strong>
          <small>50 sun</small>
        </button>
        <button class="seed-card" data-plant="ice" type="button">
          <span class="mini-plant ice"></span>
          <strong>Ice Bloom</strong>
          <small>75 sun</small>
        </button>
        <button class="seed-card" data-plant="fire" type="button">
          <span class="mini-plant fire"></span>
          <strong>Fire Bloom</strong>
          <small>100 sun</small>
        </button>
        <button class="seed-card" data-plant="wall" type="button">
          <span class="mini-plant wall"></span>
          <strong>Wall Leaf</strong>
          <small>50 sun</small>
        </button>
        <button class="seed-card" data-plant="chomper" type="button">
          <span class="mini-plant chomper"></span>
          <strong>Chomper</strong>
          <small>125 sun</small>
        </button>
      </section>

      <section class="table" aria-label="Plants versus zombies lawn">
        <section class="message-panel" aria-live="polite">
          <h2 id="message-title">Defend the lawn</h2>
          <p id="message">Choose a plant, then click a lawn tile. Stop the zombies before they cross the left edge.</p>
          <a class="changelog-link" href="changelog.html">Changelog</a>
        </section>

        <div class="lawn-wrap">
          <div id="lawn" class="lawn" aria-label="Lawn grid"></div>
        </div>
      </section>
    </main>

    <script src="app.js?v=1.0"></script>
  </body>
</html>
